  <script type="text/babel" data-presets="react">
// Interactive piston cross-section diagram.
// 8 clickable parts: 2 compression rings, oil ring, pin, skirt, rod, main bearing, rod bearing.
// Build animation: rings drop in, then pin slides in, then rod attaches, then bearings clamp on.

const { motion, AnimatePresence } = window.framerMotion || window.Motion || {};
// framer-motion UMD exposes itself as window.Motion sometimes. Detect.
const FM = window.framerMotion || window.Motion || window['framer-motion'] || {};
const M = FM.motion || motion;
const AP = FM.AnimatePresence || AnimatePresence;

// Color tokens reused
const C = {
  steel:    '#8A807A',
  steelDk:  '#5A5249',
  steelHi:  '#A89F97',
  body:     '#3A302B',
  bodyDk:   '#241F1B',
  ember:    '#2563EB',
  emberDim: '#1E40AF',
  forge:    '#E63946',
  bone:     '#F5F1ED',
  ink:      '#0B0908',
};

// One reusable highlighted-stroke wrapper
const Hot = ({ active, children, onClick, onHover, onLeave, label, id }) => (
  <g
    onClick={onClick}
    onMouseEnter={onHover}
    onMouseLeave={onLeave}
    style={{ cursor: 'pointer' }}
    data-part={id}
  >
    {children}
    {active && (
      <M.g
        initial={{ opacity: 0 }}
        animate={{ opacity: 1 }}
        exit={{ opacity: 0 }}
      >
        {/* glow happens in parent component via filter */}
      </M.g>
    )}
  </g>
);

// Hotspot leader-line callout — drafting/blueprint style.
// Из точки (x,y) на детали идёт изломанная линия к табличке (lx,ly) с номером и текстом.
function HotLabel({ x, y, lx, ly, num, label, sub, active, hover, onClick, onHover, onLeave, side='right' }) {
  const isLit = active || hover;
  const stroke = isLit ? C.ember : '#5A5249';
  // изломанная (dog-leg) выноска: горизонтальный кусок к табличке
  const elbowX = side === 'right' ? lx - 8 : lx + 8;
  const path = `M ${x} ${y} L ${elbowX} ${y} L ${lx} ${ly}`;
  const textAnchor = side === 'right' ? 'start' : 'end';
  const tx = side === 'right' ? lx + 26 : lx - 26;

  return (
    <g
      onClick={onClick}
      onMouseEnter={onHover}
      onMouseLeave={onLeave}
      style={{ cursor: 'pointer' }}
    >
      {/* invisible fat hit zone */}
      <path d={path} stroke="transparent" strokeWidth="14" fill="none"/>
      <path d={path} stroke={stroke} strokeWidth={isLit ? 1.4 : 0.9}
        fill="none" strokeDasharray={isLit ? '0' : '3 3'}/>
      {/* anchor dot on the part */}
      <circle cx={x} cy={y} r={isLit ? 3.5 : 2.8} fill={C.ink} stroke={stroke} strokeWidth="1.2"/>
      <circle cx={x} cy={y} r={isLit ? 1.4 : 1} fill={stroke}/>
      {/* number badge */}
      <g transform={`translate(${lx - 11}, ${ly - 10})`}>
        <rect width="22" height="20" rx="2"
          fill={isLit ? C.ember : C.bodyDk}
          stroke={isLit ? C.ember : '#3A302B'} strokeWidth="1"/>
        <text x="11" y="14" textAnchor="middle"
          fontFamily="JetBrains Mono, monospace"
          fontSize="11" fontWeight="700"
          fill={isLit ? C.ink : C.bone}>
          {num.toString().padStart(2,'0')}
        </text>
      </g>
      {/* text label next to number */}
      {label && (
        <g>
          <text x={tx} y={ly - 1} textAnchor={textAnchor}
            fontFamily="Space Grotesk, sans-serif" fontSize="11" fontWeight="600"
            fill={isLit ? C.ember : C.bone}>{label}</text>
          {sub && (
            <text x={tx} y={ly + 11} textAnchor={textAnchor}
              fontFamily="JetBrains Mono, monospace" fontSize="8.5"
              fill={isLit ? C.ember : '#8A807A'} opacity="0.85">{sub}</text>
          )}
        </g>
      )}
    </g>
  );
}

function PistonDiagram({ activeId, hoverId, onSelect, onHover }) {
  // animation timing
  const T = (delay, dur=0.6) => ({ duration: dur, delay, ease: [0.22, 1, 0.36, 1] });

  // 4-stroke cycle state
  const [running, setRunning] = React.useState(false);
  const [phase, setPhase] = React.useState(0);

  React.useEffect(() => {
    if (!running) return;
    const id = setInterval(() => setPhase(p => (p + 1) % 4), 1100);
    return () => clearInterval(id);
  }, [running]);

  const PHASES = [
    { id: 'intake',      ru: 'ВПУСК',   dir: '▼' },
    { id: 'compression', ru: 'СЖАТИЕ',  dir: '▲' },
    { id: 'power',       ru: 'РАБОЧИЙ', dir: '▼' },
    { id: 'exhaust',     ru: 'ВЫПУСК',  dir: '▲' },
  ];
  const intakeOpen  = running && phase === 0;
  const exhaustOpen = running && phase === 3;
  const combusting  = running && phase === 2;
  const compressing = running && phase === 1;
  // piston travel: TDC at y=0 (rest), BDC at y=22 (down)
  const pistonY = !running ? 0 : (phase === 0 || phase === 2) ? 22 : 0;

  const isLit = (id) => activeId === id || hoverId === id;
  const dim   = (id) => activeId && activeId !== id ? 0.35 : 1;

  return (
    <svg viewBox="0 0 560 600" className="w-full h-full" style={{ overflow: 'visible' }}
         preserveAspectRatio="xMidYMid meet">
      <defs>

          <stop offset="0" stopColor="#2A2320"/>
          <stop offset="0.3" stopColor="#5A5249"/>
          <stop offset="0.55" stopColor="#A89F97"/>
          <stop offset="0.8" stopColor="#5A5249"/>
          <stop offset="1" stopColor="#241F1B"/>
        </linearGradient>
        <linearGradient id="ringGrad" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0" stopColor="#1F1A17"/>
          <stop offset="0.5" stopColor="#8A807A"/>
          <stop offset="1" stopColor="#1F1A17"/>

        <linearGradient id="rodGrad" x1="0" x2="1" y1="0" y2="0">

          <stop offset="0.5" stopColor="#8A807A"/>
          <stop offset="1" stopColor="#241F1B"/>

      <HotLabel x={268} y={270} lx={360} ly={272} num={5} side="right"

      {/* Left side labels */}

        active={activeId==='rod'} hover={hoverId==='rod'}
        onClick={() => onSelect('rod')} onHover={() => onHover('rod')} onLeave={() => onHover(null)}/>
      <HotLabel x={172} y={448} lx={70} ly={448} num={8} side="left"

      <HotLabel x={302} y={470} lx={420} ly={470} num={7} side="right"
        active={activeId==='mainBear'} hover={hoverId==='mainBear'}

          {running ? `${(phase + 1).toString().padStart(2,'0')} · ${PHASES[phase].ru} ${PHASES[phase].dir}` : 'PRESS PLAY ▸'}
        </text>
        <text x="380" y="20" textAnchor="end">SCALE 1:1</text>
        <text x="380" y="32" textAnchor="end">UNITS: mm</text>

        <rect width="84" height="22" rx="2"
          fill={running ? C.ember : C.bodyDk}
          stroke={C.ember} strokeWidth="1.2"/>

          <g fill={C.ink}>

        <path d="M 472 8 L 462 8 M 472 8 L 472 18"/>
        <path d="M 8 552 L 18 552 M 8 552 L 8 542"/>
        <path d="M 472 552 L 462 552 M 472 552 L 472 542"/>
      </g>
    </svg>
  );
}

  <script type="text/babel" data-presets="react">
// Forms: engine picker (main conversion), B2B partner form, FAQ accordion.

const { useState: useStateF } = React;

function EnginePickerForm() {
  const [maker, setMaker] = useStateF(null);
  const [code, setCode] = useStateF('');
  const [parts, setParts] = useStateF([]);
  const [size, setSize] = useStateF('STD');
  const [phone, setPhone] = useStateF('');
  const [submitted, setSubmitted] = useStateF(false);
  const [suggest, setSuggest] = useStateF([]);

  const togglePart = (id) => {
    setParts(prev => prev.includes(id) ? prev.filter(p => p !== id) : [...prev, id]);
  };

  const onCodeChange = (v) => {
    setCode(v.toUpperCase());
    if (v.length >= 1) {
      const all = ENGINES.map(e => e.code);
      setSuggest(all.filter(c => c.toUpperCase().startsWith(v.toUpperCase())).slice(0, 6));
    } else {
      setSuggest([]);
    }
  };

  const submit = (e) => {
    e.preventDefault();
    // Собираем заявку и отправляем через WhatsApp клиента — он попадает в чат
    // с менеджером с уже заполненным сообщением, нажимает «Отправить» и заявка
    // приходит мне в WhatsApp. Никакого бэкенда не нужно.
    const partLabels = parts
      .map(id => PART_TYPES.find(p => p.id === id)?.label)
      .filter(Boolean)
      .join(', ') || '—';
    const lines = [
      'Здравствуйте! Подбор запчастей с сайта MY AVTO:',
      '',
      `• Авто: ${maker?.name || '—'}`,
      `• Двигатель: ${code || '—'}`,
      `• Что нужно: ${partLabels}`,
      `• Размер: ${size || '—'}`,
      `• Телефон: +7${phone}`,
    ];
    const text = encodeURIComponent(lines.join('\n'));
    const phoneTo = CONTACTS.phoneE164.replace(/\D/g, '');
    window.open(`https://wa.me/${phoneTo}?text=${text}`, '_blank', 'noopener');
    setSubmitted(true);
  };

  if (submitted) {
    return (
      <div className="bg-ink-850 border border-ink-600 p-10 md:p-14 text-center">
        <div className="inline-flex items-center justify-center w-16 h-16 mb-6 bg-ember-500 text-ink-900">
          <IconWhatsApp size={28}/>
        </div>
        <h3 className="font-display text-3xl md:text-4xl mb-3">Откройте WhatsApp</h3>
        <p className="text-bone-300 max-w-lg mx-auto mb-8">
          Сообщение с вашими данными уже подготовлено в WhatsApp — нажмите «Отправить»,
          и менеджер свяжется в течение 15 минут в рабочее время.
        </p>
        <div className="flex flex-col sm:flex-row gap-3 justify-center">
          <a href={CONTACTS.whatsapp} target="_blank" rel="noopener"
            className="inline-flex items-center justify-center gap-2 px-5 py-3 bg-ember-500 text-ink-900 font-medium hover:bg-ember-600 transition">
            <IconWhatsApp size={16}/> Открыть WhatsApp ещё раз
          </a>
          <button onClick={() => { setSubmitted(false); setMaker(null); setCode(''); setParts([]); setPhone(''); }}
            className="inline-flex items-center justify-center gap-2 px-5 py-3 border border-ink-600 hover:border-ember-500 transition">
            Новая заявка
          </button>
        </div>
      </div>
    );
  }

  return (
    <form onSubmit={submit} className="bg-ink-850 border border-ink-600">
      <div className="p-6 md:p-8 space-y-8">
        {/* Step 1: maker */}
        <div>
          <label className="block text-sm text-bone-300 mb-3">Марка авто</label>
          <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-2">
            {MAKERS.map(m => {
              const on = maker?.name === m.name;
              return (
                <button key={m.name} type="button" onClick={() => setMaker(m)}
                  title={m.name}
                  className={`group flex flex-col items-stretch text-[11px] font-display font-medium transition border overflow-hidden ${
                    on
                      ? 'border-ember-500 ring-2 ring-ember-500 -translate-y-0.5'
                      : 'border-ink-600 hover:border-ember-500 hover:-translate-y-0.5'
                  }`}>
                  {/* Светлая карточка-фон для логотипа — цветной лого виден как у официального бренда */}
                  <div className={`h-14 flex items-center justify-center px-3 ${on ? 'bg-bone-50' : 'bg-bone-50/95 group-hover:bg-bone-50'}`}>
                    {m.logo
                      ? <img src={m.logo} alt={m.name} className="max-h-9 max-w-[90%] object-contain"/>
                      : <span className="text-ink-900 font-bold">{m.name}</span>}
                  </div>
                  <span className={`py-1.5 text-center transition ${
                    on ? 'bg-ember-500 text-ink-900' : 'bg-ink-800 text-bone-100 group-hover:bg-ink-700'
                  }`}>{m.name}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Step 2: code */}
        <div className="relative">
          <label className="block text-sm text-bone-300 mb-3">Код двигателя или VIN</label>
          <div className="relative">
            <input
              type="text"
              value={code}
              onChange={e => onCodeChange(e.target.value)}
              onBlur={() => setTimeout(() => setSuggest([]), 150)}
              placeholder="2AZ-FE, EJ20, K24, 4B11..."
              className="w-full bg-ink-900 border border-ink-600 px-4 py-3.5 font-mono text-lg tracking-wider focus:outline-none focus:border-ember-500 placeholder:text-bone-700"
            />
            <IconSearch className="absolute right-4 top-1/2 -translate-y-1/2 text-bone-500" size={18}/>
          </div>
          {suggest.length > 0 && (
            <div className="absolute z-10 left-0 right-0 mt-1 bg-ink-800 border border-ink-600 shadow-lift">
              {suggest.map(s => (
                <button type="button" key={s} onMouseDown={() => { setCode(s); setSuggest([]); }}
                  className="w-full px-4 py-2.5 text-left font-mono hover:bg-ink-700 hover:text-ember-500 transition flex items-center justify-between">
                  <span>{s}</span>
                  <span className="text-xs text-bone-500">{ENGINES.find(e => e.code === s)?.cars.split(',')[0]}</span>
                </button>
              ))}
            </div>
          )}
        </div>

        {/* Step 3: parts */}
        <div>
          <label className="block text-sm text-bone-300 mb-3">Что нужно</label>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
            {PART_TYPES.map(p => {
              const on = parts.includes(p.id);
              return (
                <button type="button" key={p.id} onClick={() => togglePart(p.id)}
                  className={`p-3 text-left text-sm transition border flex items-start gap-2 ${
                    on ? 'bg-ember-500/10 border-ember-500 text-bone-50'
                       : 'bg-ink-800 border-ink-600 text-bone-300 hover:border-ink-500'
                  }`}>
                  <div className={`w-4 h-4 mt-0.5 border flex-shrink-0 flex items-center justify-center ${
                    on ? 'bg-ember-500 border-ember-500' : 'border-bone-500'
                  }`}>
                    {on && <IconCheck size={11} sw={3} className="text-ink-900"/>}
                  </div>
                  <span className="leading-tight">{p.label}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Step 3b: size */}
        <div>
          <label className="block text-sm text-bone-300 mb-3">Ремонтный размер</label>
          <div className="flex flex-wrap gap-2">
            {SIZES.map(s => (
              <button type="button" key={s} onClick={() => setSize(s)}
                className={`px-4 py-2 font-mono text-sm border transition ${
                  size === s
                    ? 'bg-ember-500 text-ink-900 border-ember-500'
                    : 'bg-ink-800 border-ink-600 text-bone-300 hover:border-ember-500'
                }`}>{s}</button>
            ))}
          </div>
        </div>

        {/* Step 4: phone */}
        <div>
          <label className="block text-sm text-bone-300 mb-3">Телефон / WhatsApp</label>
          <div className="flex gap-2">
            <div className="px-4 py-3.5 bg-ink-900 border border-ink-600 font-mono text-bone-300">+7</div>
            <input
              type="tel"
              value={phone}
              onChange={e => setPhone(e.target.value)}
              placeholder="700 123 45 67"
              className="flex-1 bg-ink-900 border border-ink-600 px-4 py-3.5 font-mono focus:outline-none focus:border-ember-500 placeholder:text-bone-700"
              required
            />
          </div>
        </div>

        {/* Submit */}
        <div className="pt-2">
          <button type="submit"
            className="group w-full bg-ember-500 hover:bg-ember-600 text-ink-900 font-display font-semibold text-lg py-4 transition flex items-center justify-center gap-3 ember-pulse">
            Отправить
            <IconArrowRight size={20} sw={2} className="group-hover:translate-x-1 transition"/>
          </button>
        </div>
      </div>
    </form>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// B2B Partner form (compact)
// ─────────────────────────────────────────────────────────────────────────────
function PartnerForm() {
  const [submitted, setSubmitted] = useStateF(false);
  const [data, setData] = useStateF({ company: '', name: '', phone: '', volume: '5-20' });

  const submit = (e) => {
    e.preventDefault();
    const lines = [
      'Здравствуйте! Хотим стать партнёром MY AVTO:',
      '',
      `• Компания: ${data.company || '—'}`,
      `• Контакт: ${data.name || '—'}`,
      `• Телефон: ${data.phone || '—'}`,
      `• Капиталок в месяц: ${data.volume}`,
    ];
    const text = encodeURIComponent(lines.join('\n'));
    const phoneTo = CONTACTS.phoneE164.replace(/\D/g, '');
    window.open(`https://wa.me/${phoneTo}?text=${text}`, '_blank', 'noopener');
    setSubmitted(true);
  };

  if (submitted) {
    return (
      <div className="border border-ember-500 bg-ember-500/5 p-6 text-center">
        <IconWhatsApp size={28} className="mx-auto mb-2"/>
        <div className="font-display text-lg">Откройте WhatsApp</div>
        <div className="text-sm text-bone-300 mt-1">Сообщение готово — нажмите «Отправить» в WhatsApp.</div>
      </div>
    );
  }

  return (
    <form onSubmit={submit} className="space-y-3">
      <input required value={data.company} onChange={e => setData({...data, company: e.target.value})}
        placeholder="Название СТО / моторного цеха"
        className="w-full bg-ink-900 border border-ink-600 px-4 py-3 focus:outline-none focus:border-ember-500 placeholder:text-bone-700"/>
      <div className="grid grid-cols-2 gap-2">
        <input required value={data.name} onChange={e => setData({...data, name: e.target.value})}
          placeholder="Имя"
          className="w-full bg-ink-900 border border-ink-600 px-4 py-3 focus:outline-none focus:border-ember-500 placeholder:text-bone-700"/>
        <input required value={data.phone} onChange={e => setData({...data, phone: e.target.value})}
          placeholder="+7 ..."
          className="w-full bg-ink-900 border border-ink-600 px-4 py-3 font-mono focus:outline-none focus:border-ember-500 placeholder:text-bone-700"/>
      </div>
      <div>
        <div className="font-mono text-xs text-bone-500 mb-2 tracking-wider">КАПИТАЛОК В МЕСЯЦ</div>
        <div className="flex gap-2 flex-wrap">
          {['1-4', '5-20', '20+'].map(v => (
            <button type="button" key={v} onClick={() => setData({...data, volume: v})}
              className={`px-4 py-2 font-mono text-sm border transition ${
                data.volume === v
                  ? 'bg-ember-500 text-ink-900 border-ember-500'
                  : 'bg-ink-800 border-ink-600 text-bone-300 hover:border-ember-500'
              }`}>{v}</button>
          ))}
        </div>
      </div>
      <button type="submit" className="w-full bg-ink-700 hover:bg-ember-500 hover:text-ink-900 border border-ink-600 hover:border-ember-500 font-medium py-3 transition flex items-center justify-center gap-2">
        Стать партнёром <IconArrowRight size={16}/>
      </button>
    </form>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// FAQ accordion
// ─────────────────────────────────────────────────────────────────────────────
function FAQAccordion() {
  const [open, setOpen] = useStateF(0);
  return (
    <div className="border-t border-ink-600">
      {FAQ.map((item, i) => {
        const isOpen = open === i;
        return (
          <div key={i} className="border-b border-ink-600">
            <button onClick={() => setOpen(isOpen ? -1 : i)}
              className="w-full flex items-center justify-between gap-6 py-5 text-left group">
              <div className="flex items-baseline gap-4">
                <span className="font-mono text-xs text-ember-500 tabular-nums">
                  {(i+1).toString().padStart(2,'0')}
                </span>
                <span className="font-display text-lg md:text-xl group-hover:text-ember-500 transition">
                  {item.q}
                </span>
              </div>
              <div className={`flex-shrink-0 w-9 h-9 border border-ink-600 flex items-center justify-center transition ${
                isOpen ? 'bg-ember-500 border-ember-500 text-ink-900 rotate-45' : 'text-bone-300'
              }`}>
                <IconPlus size={16} sw={2}/>
              </div>
            </button>
            <div className={`overflow-hidden transition-all ${isOpen ? 'max-h-60 pb-5' : 'max-h-0'}`}>
              <div className="pl-12 pr-12 text-bone-300 leading-relaxed">
                {item.a}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

window.EnginePickerForm = EnginePickerForm;
window.PartnerForm = PartnerForm;
window.FAQAccordion = FAQAccordion;

// ─────────────────────────────────────────────────────────────────────────────
// Root App
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [activeId, setActiveId] = useState(null);
  const [hoverId, setHoverId] = useState(null);
  const [autoIdx, setAutoIdx] = useState(0);
  const [userInteracted, setUserInteracted] = useState(false);

  const onSelectPart = (id) => {
    setUserInteracted(true);
    setActiveId(prev => prev === id ? null : id);
  };
  const onHoverPart = (id) => {
    if (id) setUserInteracted(true);
    setHoverId(id);
  };

  // Автоплей подсветки на мобиле — пока пользователь не тапнул, перебираем детали по кругу.
  // Подсказывает что схема интерактивная даже без курсора.
  useEffect(() => {
    if (userInteracted) return;
    const isMobile = typeof window !== 'undefined' && window.matchMedia('(max-width: 1023px)').matches;
    if (!isMobile) return;
    const t = setInterval(() => {
      setAutoIdx(i => (i + 1) % PISTON_PARTS.length);
    }, 1400);
    return () => clearInterval(t);
  }, [userInteracted]);

  const displayHoverId = userInteracted ? hoverId : PISTON_PARTS[autoIdx]?.id;

  return (
    <div className="min-h-screen bg-ink-900 text-bone-50">
      <NavBar/>
      <Hero
        activeId={activeId}
        hoverId={displayHoverId}
        onSelectPart={onSelectPart}
        onHoverPart={onHoverPart}
      />
      <PickerSection/>
      <EnginesGrid/>
      <BrandsSection/>
      <Footer/>
      <PartDetailPanel partId={activeId} onClose={() => setActiveId(null)}/>
      <MobileStickyCTA/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

  </script>

// Hotspot leader-line callout — drafting/blueprint style.
// Из точки (x,y) на детали идёт изломанная линия к табличке (lx,ly) с номером и текстом.
function HotLabel({ x, y, lx, ly, num, label, sub, active, hover, onClick, onHover, onLeave, side='right' }) {
  const isLit = active || hover;
  const stroke = isLit ? C.ember : '#5A5249';
  // изломанная (dog-leg) выноска: горизонтальный кусок к табличке
  const elbowX = side === 'right' ? lx - 8 : lx + 8;
  const path = `M ${x} ${y} L ${elbowX} ${y} L ${lx} ${ly}`;
  const textAnchor = side === 'right' ? 'start' : 'end';
  const tx = side === 'right' ? lx + 26 : lx - 26;

  return (
    <g
      onClick={onClick}
      onMouseEnter={onHover}
      onMouseLeave={onLeave}
      style={{ cursor: 'pointer' }}
    >
      {/* invisible fat hit zone */}
      <path d={path} stroke="transparent" strokeWidth="14" fill="none"/>
      <path d={path} stroke={stroke} strokeWidth={isLit ? 1.4 : 0.9}
        fill="none" strokeDasharray={isLit ? '0' : '3 3'}/>
      {/* anchor dot on the part */}
      <circle cx={x} cy={y} r={isLit ? 3.5 : 2.8} fill={C.ink} stroke={stroke} strokeWidth="1.2"/>
      <circle cx={x} cy={y} r={isLit ? 1.4 : 1} fill={stroke}/>
      {/* number badge */}
      <g transform={`translate(${lx - 11}, ${ly - 10})`}>
        <rect width="22" height="20" rx="2"
          fill={isLit ? C.ember : C.bodyDk}
          stroke={isLit ? C.ember : '#3A302B'} strokeWidth="1"/>
        <text x="11" y="14" textAnchor="middle"
          fontFamily="JetBrains Mono, monospace"
          fontSize="11" fontWeight="700"
          fill={isLit ? C.ink : C.bone}>
          {num.toString().padStart(2,'0')}
        </text>
      </g>
      {/* text label next to number */}
      {label && (
        <g>
          <text x={tx} y={ly - 1} textAnchor={textAnchor}
            fontFamily="Space Grotesk, sans-serif" fontSize="11" fontWeight="600"
            fill={isLit ? C.ember : C.bone}>{label}</text>
          {sub && (
            <text x={tx} y={ly + 11} textAnchor={textAnchor}
              fontFamily="JetBrains Mono, monospace" fontSize="8.5"
              fill={isLit ? C.ember : '#8A807A'} opacity="0.85">{sub}</text>
          )}
        </g>
      )}
    </g>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Root App
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [activeId, setActiveId] = useState(null);
  const [hoverId, setHoverId] = useState(null);
  const [autoIdx, setAutoIdx] = useState(0);
  const [userInteracted, setUserInteracted] = useState(false);

  const onSelectPart = (id) => {
    setUserInteracted(true);
    setActiveId(prev => prev === id ? null : id);
  };
  const onHoverPart = (id) => {
    if (id) setUserInteracted(true);
    setHoverId(id);
  };

  // Автоплей подсветки на мобиле — пока пользователь не тапнул, перебираем детали по кругу.
  // Подсказывает что схема интерактивная даже без курсора.
  useEffect(() => {
    if (userInteracted) return;
    const isMobile = typeof window !== 'undefined' && window.matchMedia('(max-width: 1023px)').matches;
    if (!isMobile) return;
    const t = setInterval(() => {
      setAutoIdx(i => (i + 1) % PISTON_PARTS.length);
    }, 1400);
    return () => clearInterval(t);
  }, [userInteracted]);

  const displayHoverId = userInteracted ? hoverId : PISTON_PARTS[autoIdx]?.id;

  return (
    <div className="min-h-screen bg-ink-900 text-bone-50">
      <NavBar/>
      <Hero
        activeId={activeId}
        hoverId={displayHoverId}
        onSelectPart={onSelectPart}
        onHoverPart={onHoverPart}
      />
      <TrustStrip/>
      <PickerSection/>
      <EnginesGrid/>
      <BrandsSection/>
      <B2BSection/>
      <ArticlesSection/>
      <FAQSection/>
      <Footer/>
      <PartDetailPanel partId={activeId} onClose={() => setActiveId(null)}/>
      <MobileStickyCTA/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
